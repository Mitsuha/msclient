name: CI

# 每次 push / PR 到 master：静态分析、测试，并在三端用原生 Flutter 试编译。
# 目的是快速发现编译/测试问题，不调用 Shorebird，也不消耗 Shorebird 的 release 版本额度。
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支的旧运行自动取消，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  analyze-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze lib/ test/
      - name: flutter test
        run: no_proxy='*' flutter test

  build:
    needs: analyze-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-22.04
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 构建依赖
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - name: flutter build ${{ matrix.target }}
        run: flutter build ${{ matrix.target }} --release
