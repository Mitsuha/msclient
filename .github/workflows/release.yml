name: Release

# 触发方式：
#   1) 推送形如 v1.2.3 的 tag  ->  自动用该版本号做 Shorebird release 并发布 GitHub Release
#   2) 手动 workflow_dispatch    ->  需填入 version
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（不带 v，如 1.2.3）"
        required: true

permissions:
  contents: write

env:
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "解析出的版本号：$V"

  # ---------------------------------------------------------------- Windows
  windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Shorebird release (windows)
        shell: bash
        run: |
          shorebird release --platforms=windows \
            --build-name="$VERSION" --build-number="${{ github.run_number }}"

      - name: 打包 zip + 安装程序
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $rel = "build/windows/x64/runner/Release"
          Compress-Archive -Path "$rel/*" -DestinationPath "dist/MirrorStages-Desktop-$env:VERSION-windows-x64.zip"
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" "packaging\windows\installer.iss" `
            "/DMyAppVersion=$env:VERSION" `
            "/DSourceDir=$PWD\build\windows\x64\runner\Release" `
            "/O$PWD\dist"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Linux
  linux:
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev imagemagick

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Shorebird release (linux)
        run: |
          shorebird release --platforms=linux \
            --build-name="$VERSION" --build-number="${{ github.run_number }}"

      - name: 生成图标 + 打包 tar/deb/AppImage
        run: |
          mkdir -p dist
          BUNDLE=build/linux/x64/release/bundle
          convert "assets/tray/app_icon.ico[0]" -resize 256x256 dist/icon.png
          tar -C "$BUNDLE" -czf "dist/MirrorStages-Desktop-${VERSION}-linux-x64.tar.gz" .
          bash packaging/linux/build-deb.sh      "$VERSION" "$BUNDLE" dist/icon.png dist
          bash packaging/linux/build-appimage.sh "$VERSION" "$BUNDLE" dist/icon.png dist
          rm -f dist/icon.png

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS
  macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Shorebird release (macos)
        run: |
          shorebird release --platforms=macos \
            --build-name="$VERSION" --build-number="${{ github.run_number }}"

      - name: 打包 dmg
        run: |
          mkdir -p dist
          brew install create-dmg
          APP=build/macos/Build/Products/Release/desktop.app
          bash packaging/macos/build-dmg.sh "$VERSION" "$APP" dist

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- 发布
  publish:
    needs: [prepare, windows, linux, macos]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 汇总产物
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -lh dist

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MirrorStages Desktop v${{ env.VERSION }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: dist/*
